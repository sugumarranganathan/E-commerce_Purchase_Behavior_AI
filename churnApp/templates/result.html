<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>E-Commerce Purchase Behavior Prediction AI - Result</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #eef4ff;
            margin: 0;
            padding: 20px;
        }
        .container {
            width: 90%;
            max-width: 900px;
            margin: 40px auto;
            background: #ffffff;
            padding: 35px;
            border-radius: 18px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.08);
            text-align: center;
        }
        h1 {
            color: #1e3a8a;
            font-size: 34px;
            margin-bottom: 20px;
        }
        .result-box {
            margin: 25px auto;
            padding: 20px;
            border-radius: 14px;
            font-size: 26px;
            font-weight: bold;
            background: #dbeafe;
            color: #1d4ed8;
        }
        .sub {
            font-size: 18px;
            margin-top: 15px;
            color: #374151;
        }
        .btn {
            display: inline-block;
            margin-top: 25px;
            background: #2563eb;
            color: white;
            text-decoration: none;
            padding: 12px 24px;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
        }
        .btn:hover {
            background: #1d4ed8;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>AI Prediction Result</h1>

        <div class="result-box">
            {{ result }}
        </div>

        {% if confidence %}
            <div class="sub">Prediction Confidence: {{ confidence }}%</div>
        {% endif %}

        <div class="sub">Model Output: {{ raw_result }}</div>

        <a href="/" class="btn">Predict Another Entry</a>
    </div>
</body>
</html>
