<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Fashion Customer Churn Prediction</title>
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: Arial, sans-serif;
            background: #eef4ff;
            margin: 0;
            padding: 20px;
        }
        .container {
            width: 95%;
            max-width: 1200px;
            margin: 10px auto;
            background: #ffffff;
            padding: 25px 30px;
            border-radius: 18px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.08);
        }
        h1 {
            color: #1e3a8a;
            margin-bottom: 10px;
            font-size: 28px;
        }
        p {
            color: #333;
            margin-bottom: 20px;
            font-size: 16px;
        }
        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 18px 30px;
        }
        .form-group {
            display: flex;
            flex-direction: column;
        }
        label {
            font-weight: bold;
            margin-bottom: 6px;
            font-size: 15px;
            color: #111827;
        }
        input {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #cbd5e1;
            border-radius: 8px;
            font-size: 15px;
            outline: none;
            background: #fff;
        }
        input:focus {
            border-color: #2563eb;
            box-shadow: 0 0 0 3px rgba(37,99,235,0.12);
        }
        .btn-wrap {
            text-align: center;
            margin-top: 22px;
        }
        .btn {
            background: #2563eb;
            color: white;
            padding: 12px 28px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            cursor: pointer;
            font-weight: bold;
        }
        .btn:hover {
            background: #1d4ed8;
        }
        .errorlist {
            color: red;
            list-style: none;
            padding: 0;
            margin: 5px 0 0;
            font-size: 13px;
        }
        @media (max-width: 768px) {
            .form-grid { grid-template-columns: 1fr; }
            .container { padding: 20px; }
            h1 { font-size: 24px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Fashion Customer Churn Prediction</h1>
        <p>Enter 12 important customer details to predict churn.</p>

        <form method="post">
            {% csrf_token %}
            <div class="form-grid">
                {% for field in form %}
                    <div class="form-group">
                        <label>{{ field.label }}</label>
                        {{ field }}
                        {{ field.errors }}
                    </div>
                {% endfor %}
            </div>

            <div class="btn-wrap">
                <button type="submit" class="btn">Predict Churn</button>
            </div>
        </form>
    </div>
</body>
</html>
